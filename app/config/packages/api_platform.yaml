api_platform:
    title: t-price-checker API
    version: 1.0.0
    defaults:
        route_prefix: '/v1'
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
        normalization_context:
            skip_null_values: false

    formats:
        jsonld:
            mime_types: [ 'application/ld+json' ]
        json:
            mime_types: [ 'application/json' ]

    swagger:
        api_keys:
            access_token:
                name: Authorization
                type: header
